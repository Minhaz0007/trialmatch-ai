version: "3.9"

services:
  backend:
    image: 692859918209.dkr.ecr.us-east-1.amazonaws.com/trialmatch-backend:latest
    ports:
      - "80:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-2}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - CHROMA_PERSIST_DIR=/app/backend/data/chroma_store
    volumes:
      - chroma_data:/app/backend/data/chroma_store
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  chroma_data:
    driver: local
