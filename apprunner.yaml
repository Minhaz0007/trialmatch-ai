version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install -r backend/requirements.txt
run:
  command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
  env:
    - name: PYTHONPATH
      value: "/app"
    - name: CHROMA_PERSIST_DIR
      value: "/app/backend/data/chroma_store"
